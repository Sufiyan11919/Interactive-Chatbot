<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="app-container">
        <!-- Left Panel: Document Management -->
        <aside id="doc-panel">
            <h2 class="panel-title">Document Management</h2>

            <section class="card">
                <h3 class="section-title">Upload Document</h3>

                <form id="upload-form">
                    <div class="custom-file-input">
                        <input type="file" id="file-input" />
                        <label for="file-input" class="file-label">Choose File</label>
                        <span id="file-name">No file chosen</span>
                    </div>
                    <button type="button" id="upload-btn" class="btn btn-success">Upload</button>
                </form>
            </section>

            <section id="uploaded-docs" class="uploaded-section">
                <h3 class="section-title">Uploaded Documents</h3>

                <!-- Empty state until added tp list -->
                <p id="empty-docs" class="empty-state">No documents uploaded yet</p>

                <ul id="docs-list"></ul>
            </section>
        </aside>

        <!--  AI Chat -->
        <main id="chat-container">
            <h2 class="panel-title">AI Chat</h2>

            <div id="messages"></div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Begin chatting..." />
                <button id="send-btn" class="btn btn-primary">Send</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
